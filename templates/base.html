<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Devis {{ maison_name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="brand-name">{{ maison_name }}</span>
    </a>
    <nav class="topbar-right">
      <a href="{{ url_for('guide') }}" class="topbar-link">Guide</a>
      <span class="topbar-sep">·</span>
      <a href="{{ url_for('admin_coefficients') }}" class="topbar-link">Coefficients</a>
      <span class="topbar-sep">·</span>
      Service après-vente
    </nav>
  </header>

  <main class="container {% block container_class %}{% endblock %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flashes">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
