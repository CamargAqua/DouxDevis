{% extends "base.html" %}
{% block title %}Nouveau devis — DOUX Joaillier{% endblock %}
{% block content %}
<section class="card">
  <div class="hero">
    <h1>Nouveau devis</h1>
    <p class="lead">Importez le PDF reçu du partenaire horloger. Les informations sont extraites automatiquement.</p>
  </div>

  <form action="{{ url_for('extract') }}" method="post" enctype="multipart/form-data" class="upload-form">
    <label for="pdf" class="dropzone" id="dropzone">
      <span class="dropzone-icon">📄</span>
      <span class="dropzone-title">Glisser-déposer le PDF ici</span>
      <span class="dropzone-sub">ou cliquer pour parcourir — max 25 Mo</span>
      <input type="file" id="pdf" name="pdf" accept="application/pdf" required>
      <span id="filename" class="dropzone-filename" style="display:none"></span>
    </label>

    <button type="submit" class="btn btn-primary btn-lg" style="align-self:center;min-width:220px">
      Extraire les informations
    </button>
    <p class="hint">⏱ L'extraction prend généralement 10 à 20 secondes</p>
  </form>
</section>

<script>
  const input = document.getElementById('pdf');
  const fname = document.getElementById('filename');
  const zone  = document.getElementById('dropzone');

  input.addEventListener('change', () => {
    if (input.files[0]) {
      fname.textContent = input.files[0].name;
      fname.style.display = 'inline';
      zone.style.borderColor = 'var(--gold)';
      zone.style.background  = 'var(--gold-ultra)';
    }
  });

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', () => zone.classList.remove('drag-over'));
</script>
{% endblock %}
